services:
  app:
    build:
      context: .
      dockerfile: src/GolfManager.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DatabaseProvider: Sqlite
      ConnectionStrings__DefaultConnection: Data Source=/data/GolfManager.db
      Jwt__SecretKey: ${Jwt__SecretKey:-DevSecretKeyThatIsAtLeast32CharactersLong!}
      Jwt__Issuer: ${Jwt__Issuer:-GolfManager}
      Jwt__Audience: ${Jwt__Audience:-GolfManager}
    volumes:
      - golf-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  golf-data:
