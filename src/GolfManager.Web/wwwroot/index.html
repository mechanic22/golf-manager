<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfManager.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
<link rel="stylesheet" href="_content/FifthBox.MaterialComponents.Blazor/css/material-components.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="GolfManager.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-card">
                <div class="loading-header">
                    <img src="img/pinzo-green.png" alt="Pinzo Logo" class="loading-logo" />
                    <h1 class="loading-app-title">Pinzo</h1>
                </div>
                <p class="loading-status-text" id="loading-status">Loading application...</p>
                <div class="loading-bar-wrap">
                    <div class="loading-bar-track">
                        <div class="loading-bar-fill"></div>
                    </div>
                    <span class="loading-progress-text"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        (function () {
            var msgs = [
                [0, "Loading application..."],
                [2000, "Downloading resources..."],
                [5000, "Initializing runtime..."],
                [9000, "Almost ready..."]
            ];
            msgs.forEach(function (m) {
                setTimeout(function () {
                    var el = document.getElementById('loading-status');
                    if (el && document.getElementById('app')) el.textContent = m[1];
                }, m[0]);
            });
        })();
    </script>
    <script src="_content/FifthBox.MaterialComponents.Blazor/js/material-components.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
